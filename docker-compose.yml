# One command to run the whole demo:  docker compose up --build
#
#   • API  →  http://localhost:8000  (FastAPI; /docs for the OpenAPI UI)
#   • UI   →  http://localhost:3000  (Next.js inspector)
#
# Live Claude answers: put ANTHROPIC_API_KEY in a .env file next to this file.
# Without a key the demo runs in deterministic OFFLINE mode (still fully traceable).
#
# Optional production swaps:
#   • True BGE-M3 multilingual embeddings:  build arg INSTALL_ML=true (see Dockerfile)
#   • Qdrant vector store:  `docker compose --profile qdrant up` + ABA_VECTOR_BACKEND=qdrant

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_ML: "false"
    ports:
      - "8000:8000"
    environment:
      ABA_LLM_PROVIDER: ${ABA_LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ABA_OPENAI_BASE_URL: ${ABA_OPENAI_BASE_URL:-https://api.openai.com/v1}
      ABA_OFFLINE_MODE: ${ABA_OFFLINE_MODE:-auto}
      ABA_MODEL_GENERATION: ${ABA_MODEL_GENERATION:-claude-opus-4-8}
      ABA_MODEL_ROUTER: ${ABA_MODEL_ROUTER:-claude-sonnet-4-6}
      ABA_MODEL_SQL: ${ABA_MODEL_SQL:-claude-sonnet-4-6}
      ABA_VECTOR_BACKEND: ${ABA_VECTOR_BACKEND:-numpy}
      ABA_QDRANT_URL: http://qdrant:6333
    volumes:
      # Persist the embedding + LLM-response cache across restarts so the engine
      # warms up instantly (no re-embedding the corpus on every (re)start).
      - aba_cache:/app/data/cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        # The Next server proxies /api/* to the API service (single public origin, no CORS).
        API_PROXY_TARGET: http://api:8000
    environment:
      API_PROXY_TARGET: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["qdrant"]
    ports:
      - "6333:6333"

  # Public access for a live customer evaluation. Opt-in:
  #   docker compose --profile tunnel up -d
  # Then read the public URL from the tunnel's logs:
  #   docker compose logs tunnel | grep trycloudflare.com
  # The tunnel reaches the UI on the compose network (ui:3000); the UI proxies /api/*
  # to the API, so the whole app is served through one HTTPS origin (no CORS, no key
  # in the browser). This is a Cloudflare *quick tunnel* — the URL is random per start.
  tunnel:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate --url http://ui:3000
    depends_on:
      - ui
    restart: unless-stopped

volumes:
  aba_cache:
